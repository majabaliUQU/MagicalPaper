<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي الورقة العجيبة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #e5e5e5;
        }
        .paper-bg {
            background-image: 
                linear-gradient(90deg, transparent 79px, #abced4 79px, #abced4 81px, transparent 81px),
                linear-gradient(#eee .1em, transparent .1em);
            background-size: 100% 1.2em;
            background-color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border-radius: 8px;
        }
        .marker-font {
            font-family: 'Permanent Marker', cursive;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }
        .ui-element {
            pointer-events: auto;
        }
        .btn-doodle {
            background: none;
            border: 3px solid #333;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn-doodle:hover {
            transform: scale(1.05) rotate(-1deg);
            background: #fffbe0;
        }
        .funny-card {
            background: white;
            border: 3px solid #000;
            padding: 20px;
            border-radius: 10px;
            transform: rotate(-2deg);
            box-shadow: 5px 5px 0px #000;
            max-width: 300px;
            text-align: center;
        }
        .credit-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #fff;
            border: 2px solid #333;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            z-index: 100;
            transition: transform 0.2s;
        }
        .credit-badge:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<div id="game-container"></div>

<div id="overlay">
    <div class="flex justify-between items-start">
        <div class="ui-element funny-card text-blue-600 p-2 md:p-4" id="p1-score">اللاعب 1: 0</div>
        <div class="ui-element funny-card text-red-600 p-2 md:p-4" id="p2-score">اللاعب 2: 0</div>
    </div>

    <div id="start-screen" class="ui-element fixed inset-0 bg-white/95 flex flex-col items-center justify-center z-50 p-6 text-center paper-bg">
        <h1 class="text-4xl md:text-6xl font-bold mb-4 marker-font text-gray-800">تحدي الورقة العجيبة 📝</h1>
        <p class="text-lg md:text-xl mb-8">لعبة الذكريات والضحك اللامتناهي!</p>
        
        <div class="space-y-4 flex flex-col items-center">
            <button onclick="startGame()" class="btn-doodle text-2xl px-12 bg-yellow-200">ابدأ اللعب الآن!</button>
            
            <button onclick="shareGame()" class="btn-doodle text-lg px-8 bg-blue-100 flex items-center gap-2">
                <span>شارك اللعبة</span> 🔗
            </button>
        </div>
        
        <div class="mt-8 text-sm text-gray-600 max-w-md">
            <p>التحدي: "انفخ" الورقة بإصبعك. الخاسر ينفذ التحدي المكتوب!</p>
        </div>

        <div class="credit-badge" onclick="window.open('https://wa.me/966505501575', '_blank')">
            برمجة محمد جبلي 👨‍💻
        </div>
    </div>

    <div id="challenge-popup" class="ui-element fixed inset-0 bg-black/40 hidden flex items-center justify-center z-40 p-6">
        <div class="funny-card bg-yellow-50 scale-125">
            <h2 class="text-2xl font-bold mb-4" id="challenge-title">تحدي مضحك! 😂</h2>
            <p class="text-lg mb-6" id="challenge-text">قل نكتة بايخة وإلا سيأخذ الخصم نقطة إضافية!</p>
            <button onclick="closeChallenge()" class="btn-doodle bg-green-200 w-full">تم التنفيذ!</button>
        </div>
    </div>
</div>

<script>
let game;
let p1Score = 0;
let p2Score = 0;
let synth; // Moving declaration here
let noise;

function playHitSound() {
    if (synth) synth.triggerAttackRelease("C4", "8n");
}

function playGoalSound() {
    if (!synth) return;
    const melody = ["C4", "E4", "G4", "C5"];
    const now = Tone.now();
    melody.forEach((note, i) => {
        synth.triggerAttackRelease(note, "8n", now + i * 0.1);
    });
}

function triggerVibration(duration) {
    if (typeof navigator !== 'undefined' && navigator.vibrate) {
        navigator.vibrate(duration);
    }
}

function shareGame() {
    const shareData = {
        title: 'لعبة تحدي الورقة العجيبة',
        text: 'تعال نلعب ونضحك سوا في تحدي الورقة العجيبة!',
        url: window.location.href
    };

    if (navigator.share) {
        navigator.share(shareData).catch(err => console.log('Error sharing', err));
    } else {
        const dummy = document.createElement('input');
        document.body.appendChild(dummy);
        dummy.value = window.location.href;
        dummy.select();
        document.execCommand('copy');
        document.body.removeChild(dummy);
        // Using custom UI instead of alert
        const popup = document.createElement('div');
        popup.className = "fixed top-10 left-1/2 -translate-x-1/2 bg-black text-white px-6 py-3 rounded-full z-[100] animate-bounce";
        popup.innerText = "تم نسخ الرابط! 🔗";
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 2000);
    }
}

const challenges = [
    "قل للطرف الآخر 'أنا أحبك' بصوت بطة!",
    "حاول أن تلمس أنفك بلسانك لمدة 10 ثواني.",
    "قل نكتة سخيفة جداً حتى يضحك الآخر.",
    "تحدث بلهجة معلق رياضي عن الجولة القادمة.",
    "تحدي الصمت: لا تضحك لمدة دقيقة كاملة مهما فعل الآخر.",
    "اذكر موقفاً محرراً حدث لك قديماً.",
    "قل 5 كلمات تبدأ بحرف 'ق' في 5 ثواني."
];

async function startGame() {
    // Check if libraries are loaded
    if (typeof Tone === 'undefined' || typeof Phaser === 'undefined') {
        const errorMsg = document.createElement('div');
        errorMsg.className = "fixed inset-0 bg-red-500 text-white flex items-center justify-center p-10 text-center z-[200]";
        errorMsg.innerHTML = "حدث خطأ في تحميل ملفات اللعبة. <br> يرجى التأكد من اتصال الإنترنت وتحديث الصفحة.";
        document.body.appendChild(errorMsg);
        return;
    }

    try {
        await Tone.start();
        // Initialize Sound after Tone starts
        synth = new Tone.PolySynth(Tone.Synth).toDestination();
        noise = new Tone.NoiseSynth().toDestination();
        
        document.getElementById('start-screen').style.display = 'none';
        initGame();
    } catch (e) {
        console.error("Audio failed to start:", e);
        // Still start game even if audio fails
        document.getElementById('start-screen').style.display = 'none';
        initGame();
    }
}

function initGame() {
    const config = {
        type: Phaser.AUTO,
        parent: 'game-container',
        width: window.innerWidth,
        height: window.innerHeight,
        backgroundColor: '#ffffff',
        physics: {
            default: 'arcade',
            arcade: {
                gravity: { y: 0 },
                debug: false
            }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    game = new Phaser.Game(config);
}

function preload() {}

function create() {
    const scene = this;
    const width = scene.sys.game.config.width;
    const height = scene.sys.game.config.height;

    // Draw horizontal lines (Notebook style)
    const graphics = scene.add.graphics();
    graphics.lineStyle(2, 0xe8e8e8, 1);
    for (let i = 0; i < height; i += 30) {
        graphics.lineBetween(0, i, width, i);
    }
    graphics.lineStyle(3, 0xffcccc, 1);
    graphics.lineBetween(width > 600 ? 80 : 40, 0, width > 600 ? 80 : 40, height);

    // Ball (Crumpled Paper)
    this.ball = scene.add.circle(width / 2, height / 2, 25, 0xffffff);
    this.ball.setStrokeStyle(3, 0x333333);
    scene.physics.add.existing(this.ball);
    this.ball.body.setCollideWorldBounds(true);
    this.ball.body.setBounce(0.9, 0.9);
    this.ball.body.setDrag(150, 150);

    // Goals (Responsive sizing)
    const goalWidth = 20;
    const goalHeight = height * 0.4;
    this.goal1 = scene.add.rectangle(0, height / 2, goalWidth, goalHeight, 0xffcccc, 0.5);
    scene.physics.add.existing(this.goal1, true);

    this.goal2 = scene.add.rectangle(width, height / 2, goalWidth, goalHeight, 0xccccff, 0.5);
    scene.physics.add.existing(this.goal2, true);

    scene.input.on('pointerdown', (pointer) => {
        const force = 600;
        const dist = Phaser.Math.Distance.Between(pointer.x, pointer.y, this.ball.x, this.ball.y);
        
        if (dist < 150) {
            const angle = Phaser.Math.Angle.Between(pointer.x, pointer.y, this.ball.x, this.ball.y);
            this.ball.body.velocity.x += Math.cos(angle) * force;
            this.ball.body.velocity.y += Math.sin(angle) * force;
            
            playHitSound();
            triggerVibration(40);
            createScribble(scene, pointer.x, pointer.y);
        }
    });

    scene.physics.add.overlap(this.ball, this.goal1, () => scorePoint(2));
    scene.physics.add.overlap(this.ball, this.goal2, () => scorePoint(1));
}

function update() {}

function createScribble(scene, x, y) {
    const line = scene.add.graphics();
    line.lineStyle(2, 0x000000, 0.4);
    line.beginPath();
    line.moveTo(x - 15, y - 5);
    line.lineTo(x + 15, y + 5);
    line.strokePath();
    
    scene.tweens.add({
        targets: line,
        alpha: 0,
        duration: 400,
        onComplete: () => line.destroy()
    });
}

function scorePoint(player) {
    if (player === 1) p1Score++;
    else p2Score++;

    document.getElementById('p1-score').innerText = `اللاعب 1: ${p1Score}`;
    document.getElementById('p2-score').innerText = `اللاعب 2: ${p2Score}`;

    playGoalSound();
    triggerVibration([100, 50, 100]);

    game.scene.scenes[0].ball.setPosition(window.innerWidth / 2, window.innerHeight / 2);
    game.scene.scenes[0].ball.body.setVelocity(0, 0);

    showChallenge(player === 1 ? 2 : 1);
}

function showChallenge(loser) {
    const randomChallenge = challenges[Math.floor(Math.random() * challenges.length)];
    document.getElementById('challenge-text').innerText = `اللاعب ${loser} خسر الجولة!\nالتحدي: ${randomChallenge}`;
    document.getElementById('challenge-popup').style.display = 'flex';
    game.scene.pause();
}

function closeChallenge() {
    document.getElementById('challenge-popup').style.display = 'none';
    game.scene.resume();
}

window.onresize = () => {
    if (game) {
        game.scale.resize(window.innerWidth, window.innerHeight);
    }
};
</script>
</body>
</html>
